<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Letter</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="letter-container">
        <div class="letter-window">
            <div class="window-header">
                <span>L O V E</span>
                <span>- [X]</span>
            </div>
            
            <div class="window-content">
                <h1 id="letter-title">Would you like to go to a date with me?</h1>
                
                <img src="https://i.pinimg.com/originals/44/72/66/447266173c1a71da872660fe46fcfdba.gif" class="cat" id="letter-cat" alt="Gato con corazón" />
                
                <div class="buttons" id="letter-buttons">
                    <button class="btn yes-btn" id="yes-btn">YES</button>
                    <div class="no-wrapper">
                        <button class="btn no-btn" id="no-btn">NO</button>
                    </div>
                </div>
                
                <p id="final-text" class="final-text" style="display: none;">
                    <strong>Our Date:</strong> Meow Restaurant at 7pm.<br>Dress fancy!
                </p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
